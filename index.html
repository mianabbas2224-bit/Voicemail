<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <script>
      (function() {
        var fallbackAddress = '0xf4713a1a2e247145532500000000000000000000';
        var listeners = {};
        
        var mockEthereum = {
          isMetaMask: true,
          isStatus: true,
          selectedAddress: fallbackAddress,
          chainId: '0x1',
          networkVersion: '1',
          autoRefreshOnNetworkChange: false,
          isConnected: function() { return true; },
          
          request: function(args) {
            console.log('MetaMask mock request:', args ? args.method : '');
            var method = args ? args.method : '';
            if (method === 'eth_requestAccounts' || method === 'eth_accounts') {
              var accounts = [fallbackAddress];
              mockEthereum.selectedAddress = fallbackAddress;
              setTimeout(function() {
                mockEthereum.emit('connect', { chainId: '0x1' });
                mockEthereum.emit('accountsChanged', accounts);
              }, 0);
              return Promise.resolve(accounts);
            }
            if (method === 'eth_chainId') {
              return Promise.resolve('0x1');
            }
            if (method === 'net_version') {
              return Promise.resolve('1');
            }
            if (method === 'personal_sign' || method === 'eth_sign') {
              return Promise.resolve('0x30787a2d7369676e61747572652d6d6f636b2d7369676e61747572652d6d6f636b2d7369676e61747572652d6d6f636b2d7369676e61747572652d6d6f636b2d3163');
            }
            if (method === 'eth_sendTransaction') {
              return Promise.resolve('0xe670ec64341771606e55d6b4ca35a1a6b75ee3d5145a99d05921026d1527331');
            }
            if (method === 'eth_blockNumber') {
              return Promise.resolve('0xc5043f');
            }
            if (method === 'eth_getBalance') {
              return Promise.resolve('0x021e19e0c9bab2400000');
            }
            if (method === 'eth_estimateGas') {
              return Promise.resolve('0x5208');
            }
            if (method === 'eth_gasPrice') {
              return Promise.resolve('0x09184e72a000');
            }
            if (method === 'eth_getTransactionCount') {
              return Promise.resolve('0x0');
            }
            return Promise.resolve(null);
          },
          
          on: function(event, handler) {
            console.log('MetaMask mock registered event:', event);
            if (typeof handler === 'function') {
              if (!listeners[event]) {
                listeners[event] = [];
              }
              listeners[event].push(handler);
            }
            return this;
          },
          
          removeListener: function(event, handler) {
            if (listeners[event]) {
              var index = listeners[event].indexOf(handler);
              if (index > -1) {
                listeners[event].splice(index, 1);
              }
            }
            return this;
          },
          
          off: function(event, handler) {
            return this.removeListener(event, handler);
          },
          
          addListener: function(event, handler) {
            return this.on(event, handler);
          },
          
          removeAllListeners: function(event) {
            if (event) {
              delete listeners[event];
            } else {
              listeners = {};
            }
            return this;
          },
          
          emit: function(event, data) {
            if (listeners[event]) {
              listeners[event].forEach(function(handler) {
                try {
                  handler(data);
                } catch (e) {
                  console.error('Error in ethereum event handler:', e);
                }
              });
            }
          },
          
          enable: function() {
            var accounts = [fallbackAddress];
            setTimeout(function() {
              mockEthereum.emit('connect', { chainId: '0x1' });
              mockEthereum.emit('accountsChanged', accounts);
            }, 0);
            return Promise.resolve(accounts);
          },
          
          send: function(payload, callback) {
            var method = payload ? (typeof payload === 'string' ? payload : payload.method) : '';
            var result = [fallbackAddress];
            if (method === 'eth_chainId') result = '0x1';
            if (method === 'net_version') result = '1';
            
            if (typeof callback === 'function') {
              callback(null, { jsonrpc: '2.0', id: payload ? payload.id : 1, result: result });
              return;
            }
            
            if (payload && typeof payload === 'object') {
              return Promise.resolve({ jsonrpc: '2.0', id: payload.id || 1, result: result });
            }
            
            return Promise.resolve(result);
          },
          
          sendAsync: function(payload, callback) {
            var method = payload ? (typeof payload === 'string' ? payload : payload.method) : '';
            var result = [fallbackAddress];
            if (method === 'eth_chainId') result = '0x1';
            if (method === 'net_version') result = '1';
            
            if (typeof callback === 'function') {
              setTimeout(function() {
                callback(null, { jsonrpc: '2.0', id: payload ? payload.id : 1, result: result });
              }, 0);
              return;
            }
            
            return Promise.resolve({ jsonrpc: '2.0', id: payload ? payload.id : 1, result: result });
          },
          
          isUnlocked: function() { return Promise.resolve(true); },
          
          _metamask: {
            isUnlocked: function() { return Promise.resolve(true); }
          }
        };

        mockEthereum.providers = [mockEthereum];

        var currentEthereum = mockEthereum;

        try {
          Object.defineProperty(window, 'ethereum', {
            get: function() { return currentEthereum; },
            set: function(val) { currentEthereum = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          window.ethereum = mockEthereum;
        }

        try {
          window.web3 = {
            currentProvider: mockEthereum
          };
        } catch (e) {}
      })();
    </script>

    <title>Voicemails for Fatima</title>
    
    <!-- PWA homescreen icon & shortcut icon requested by user -->
    <link rel="icon" type="image/jpeg" href="/src/assets/images/app_icon_1782475213762.jpg" />
    <link rel="apple-touch-icon" href="/src/assets/images/app_icon_1782475213762.jpg" />
    
    <!-- Mobile Web App Capability tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Voicemails" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
